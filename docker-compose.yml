services:

  postgres:
    image: postgres:16
    container_name: postgres-risk-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_risk_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - risk-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres
    networks:
      - risk-network

  postgres-mcp:
    image: crystaldba/postgres-mcp:latest
    container_name: postgres-mcp-server
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URI: postgresql://postgres:postgres123@postgres:5432/productsdb
    command: >
      --access-mode=unrestricted
      --transport=sse
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - risk-network

volumes:
  postgres_risk_data:

networks:
  risk-network: